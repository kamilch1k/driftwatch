name: ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26.x'
      - name: Check formatting
        run: test -z "$(gofmt -l .)"
      - name: Test
        run: go test ./...
      - name: Build CLI and API
        run: |
          go build -o bin/driftwatch ./cmd/driftwatch
          go build -o bin/driftwatch-api ./cmd/api
      - name: Exercise sample data
        run: ./bin/driftwatch -input samples/latency.csv -format json -out reports/latency-report.json
